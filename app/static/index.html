<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Action Tester</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body class="bg-light d-flex flex-column justify-content-center align-items-center vh-100">

    <div class="text-center p-5 bg-white shadow rounded-3">
        <h1 class="mb-4 text-primary">Simple Backend Action Demo</h1>

        <button class="btn btn-primary btn-lg px-4" onclick="triggerAction()">
            Trigger Action
        </button>

        <div class="mt-4">
            <p id="message" class="fs-5 fw-bold"></p>
        </div>
    </div>

    <!-- Bootstrap JS (Optional, but good for interactive components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script>
        async function triggerAction() {
            const messageElement = document.getElementById('message');

            // Re-apply Bootstrap classes for the loading state (resetting colors)
            messageElement.className = 'fs-5 fw-bold text-dark';
            messageElement.innerText = "Loading...";

            try {
                const response = await fetch('/api/action', {
                    method: 'POST'
                });

                if (response.ok) {
                    const data = await response.json();
                    messageElement.className = 'fs-5 fw-bold text-success';
                    messageElement.innerText = data.message;
                } else {
                    messageElement.className = 'fs-5 fw-bold text-danger';
                    messageElement.innerText = "Error completing action.";
                }
            } catch (error) {
                messageElement.className = 'fs-5 fw-bold text-danger';
                messageElement.innerText = 'Network error: ' + error.message;
            }
        }
    </script>
</body>

</html>
