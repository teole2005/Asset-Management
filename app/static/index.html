<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Action Tester</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f9;
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #message {
            margin-top: 30px;
            font-size: 20px;
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body>
    <h1>Simple Backend Action Demo</h1>
    <button onclick="triggerAction()">Trigger Action</button>
    <p id="message"></p>

    <script>
        async function triggerAction() {
            const messageElement = document.getElementById('message');
            messageElement.style.color = 'black';
            messageElement.innerText = "Loading...";

            try {
                const response = await fetch('/api/action', {
                    method: 'POST'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    messageElement.style.color = '#28a745';
                    messageElement.innerText = data.message;
                } else {
                    messageElement.style.color = 'red';
                    messageElement.innerText = "Error completing action.";
                }
            } catch (error) {
                messageElement.style.color = 'red';
                messageElement.innerText = 'Network error: ' + error.message;
            }
        }
    </script>
</body>
</html>
