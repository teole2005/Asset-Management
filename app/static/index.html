<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MF IT Assets — Asset Management</title>
    <meta name="description" content="Comprehensive IT asset management system for tracking laptops, desktops, printers, and peripherals.">
    <link rel="stylesheet" href="/static/styles.css?v=2">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header fade-in">
            <div class="header-left">
                <div class="logo-icon">💻</div>
                <h1>MF IT Assets <span>Management</span></h1>
            </div>
            <div class="stats-bar" id="statsBar">
                <div class="stat-chip total"><span class="dot"></span><span id="statTotal">—</span> Total</div>
                <div class="stat-chip occupied"><span class="dot"></span><span id="statOccupied">—</span> Occupied</div>
                <div class="stat-chip available"><span class="dot"></span><span id="statAvailable">—</span> Available</div>
                <div class="stat-chip faulty"><span class="dot"></span><span id="statFaulty">—</span> Faulty</div>
            </div>
        </header>

        <!-- Toolbar -->
        <div class="toolbar fade-in fade-in-delay-1">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" placeholder="Search by tracking code, user, brand, model, serial...">
            </div>
            <select class="filter-select" id="statusFilter">
                <option value="">All Status</option>
                <option value="Available">Available</option>
                <option value="Occupied">Occupied</option>
                <option value="Faulty">Faulty</option>
            </select>
            <select class="filter-select" id="typeFilter">
                <option value="">All Types</option>
                <option value="Laptop">Laptop</option>
                <option value="Desktop">Desktop</option>
                <option value="Printer">Printer</option>
                <option value="Monitor">Monitor</option>
            </select>
        </div>

        <!-- Table -->
        <div class="table-card fade-in fade-in-delay-2">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Type</th>
                            <th>Tracking Code</th>
                            <th>Brand</th>
                            <th>Model</th>
                            <th>Serial No.</th>
                            <th>Status</th>
                            <th>User</th>
                            <th>Department</th>
                        </tr>
                    </thead>
                    <tbody id="assetTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Loading -->
            <div class="loading-overlay" id="loadingState">
                <div class="spinner"></div>
                <span class="loading-text">Loading assets...</span>
            </div>

            <!-- Empty -->
            <div class="empty-state" id="emptyState" style="display:none">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <h3>No assets found</h3>
                <p>Try adjusting your search or filters</p>
            </div>

            <!-- Footer -->
            <div class="table-footer" id="tableFooter" style="display:none">
                <span id="resultCount">Showing 0 assets</span>
                <span>MF IT Assets Database</span>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/assets';
        let allAssets = [];
        let debounceTimer = null;

        // ── Fetch & Render ──────────────────────────────────
        async function loadAssets(search = '', status = '', type = '') {
            const params = new URLSearchParams();
            if (search) params.set('search', search);
            if (status) params.set('status', status);
            if (type)   params.set('type', type);

            const url = `${API_BASE}/?${params.toString()}`;

            document.getElementById('loadingState').style.display = 'flex';
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('tableFooter').style.display = 'none';
            document.getElementById('assetTableBody').innerHTML = '';

            try {
                const res = await fetch(url);
                const data = await res.json();
                allAssets = data;
                renderTable(data);
                updateStats(data);
            } catch (err) {
                console.error('Error loading assets:', err);
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
            }
        }

        function renderTable(assets) {
            const tbody = document.getElementById('assetTableBody');
            const loading = document.getElementById('loadingState');
            const empty = document.getElementById('emptyState');
            const footer = document.getElementById('tableFooter');

            loading.style.display = 'none';

            if (assets.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                footer.style.display = 'none';
                return;
            }

            empty.style.display = 'none';
            footer.style.display = 'flex';
            document.getElementById('resultCount').textContent = `Showing ${assets.length} asset${assets.length !== 1 ? 's' : ''}`;

            tbody.innerHTML = assets.map((a, i) => `
                <tr onclick="viewDetail(${a.id})" title="Click to view details">
                    <td class="col-no">${i + 1}</td>
                    <td class="col-type">${getTypeIcon(a.type)} ${a.type || '—'}</td>
                    <td class="col-tracking">${a.tracking_code || '—'}</td>
                    <td>${a.brand || '—'}</td>
                    <td>${a.model || '—'}</td>
                    <td>${a.serial_no || '—'}</td>
                    <td>${statusBadge(a.assignment_status)}</td>
                    <td class="col-user">${a.users_name || '—'}</td>
                    <td>${a.department || '—'}</td>
                </tr>
            `).join('');
        }

        function updateStats(assets) {
            // Use allAssets for stats on initial load, filtered for search
            const total = assets.length;
            const occupied = assets.filter(a => a.assignment_status === 'Occupied').length;
            const available = assets.filter(a => a.assignment_status === 'Available').length;
            const faulty = assets.filter(a => a.assignment_status === 'Faulty').length;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statOccupied').textContent = occupied;
            document.getElementById('statAvailable').textContent = available;
            document.getElementById('statFaulty').textContent = faulty;
        }

        function statusBadge(status) {
            if (!status) return '<span class="badge badge-unknown">Unknown</span>';
            const s = status.toLowerCase();
            let cls = 'badge-unknown';
            if (s === 'available') cls = 'badge-available';
            else if (s === 'occupied') cls = 'badge-occupied';
            else if (s === 'faulty') cls = 'badge-faulty';
            return `<span class="badge ${cls}">${status}</span>`;
        }

        function getTypeIcon(type) {
            if (!type) return '📦';
            const t = type.toLowerCase();
            if (t.includes('laptop')) return '💻';
            if (t.includes('desktop')) return '🖥️';
            if (t.includes('printer')) return '🖨️';
            if (t.includes('monitor')) return '🖥️';
            return '📦';
        }

        function viewDetail(id) {
            window.location.href = `/detail?id=${id}`;
        }

        // ── Event Listeners ─────────────────────────────────
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                loadAssets(
                    e.target.value,
                    document.getElementById('statusFilter').value,
                    document.getElementById('typeFilter').value
                );
            }, 300);
        });

        document.getElementById('statusFilter').addEventListener('change', () => {
            loadAssets(
                document.getElementById('searchInput').value,
                document.getElementById('statusFilter').value,
                document.getElementById('typeFilter').value
            );
        });

        document.getElementById('typeFilter').addEventListener('change', () => {
            loadAssets(
                document.getElementById('searchInput').value,
                document.getElementById('statusFilter').value,
                document.getElementById('typeFilter').value
            );
        });

        // ── Init ────────────────────────────────────────────
        loadAssets();
    </script>
</body>
</html>
