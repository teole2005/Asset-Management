<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Detail — MF IT Assets</title>
    <meta name="description" content="Detailed view of IT asset information including specifications, assignment, and financial data.">
    <link rel="stylesheet" href="/static/styles.css?v=2">
</head>
<body>
    <div class="container">
        <!-- Back Link -->
        <a href="/" class="back-link fade-in">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to Asset List
        </a>

        <!-- Header -->
        <div class="detail-header fade-in fade-in-delay-1" id="detailHeader">
            <div class="detail-header-icon" id="headerIcon">💻</div>
            <div class="detail-header-info">
                <h1 id="headerTitle">Loading...</h1>
                <p id="headerSubtitle">—</p>
                <div id="headerBadge"></div>
            </div>
        </div>

        <!-- Loading -->
        <div class="loading-overlay" id="loadingState">
            <div class="spinner"></div>
            <span class="loading-text">Loading asset details...</span>
        </div>

        <!-- Error -->
        <div class="empty-state" id="errorState" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <h3>Asset not found</h3>
            <p>The requested asset could not be loaded.</p>
        </div>

        <!-- Detail Grid -->
        <div class="detail-grid" id="detailGrid" style="display:none">

            <!-- Device Information -->
            <div class="detail-section fade-in fade-in-delay-2">
                <div class="section-header">
                    <div class="icon purple">🖥️</div>
                    Device Information
                </div>
                <div class="detail-fields" id="deviceFields"></div>
            </div>

            <!-- Specifications -->
            <div class="detail-section fade-in fade-in-delay-3">
                <div class="section-header">
                    <div class="icon blue">⚙️</div>
                    Specifications
                </div>
                <div class="detail-fields" id="specFields"></div>
            </div>

            <!-- Peripheral Details -->
            <div class="detail-section fade-in fade-in-delay-3">
                <div class="section-header">
                    <div class="icon green">🔌</div>
                    Peripheral Details
                </div>
                <div class="detail-fields" id="peripheralFields"></div>
            </div>

            <!-- Financial Information -->
            <div class="detail-section fade-in fade-in-delay-4">
                <div class="section-header">
                    <div class="icon orange">💰</div>
                    Financial & Lifecycle
                </div>
                <div class="detail-fields" id="financialFields"></div>
            </div>

            <!-- Assignment Information -->
            <div class="detail-section fade-in fade-in-delay-4">
                <div class="section-header">
                    <div class="icon purple">👤</div>
                    Assignment Information
                </div>
                <div class="detail-fields" id="assignmentFields"></div>
            </div>

        </div>
    </div>

    <script>
        // ── Get asset ID from URL ───────────────────────────
        const params = new URLSearchParams(window.location.search);
        const assetId = params.get('id');

        function fieldRow(label, value) {
            const isEmpty = !value || value === 'None' || value === 'null';
            return `
                <div class="field-row">
                    <div class="field-label">${label}</div>
                    <div class="field-value ${isEmpty ? 'empty' : ''}">${isEmpty ? '—' : value}</div>
                </div>
            `;
        }

        function formatDate(val) {
            if (!val) return null;
            try {
                const s = String(val);
                // Handle "2026-02-06 00:00:00" format
                const dateStr = s.split(' ')[0];
                const d = new Date(dateStr);
                if (isNaN(d)) return s;
                return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
            } catch {
                return val;
            }
        }

        function statusBadge(status) {
            if (!status) return '<span class="badge badge-unknown">Unknown</span>';
            const s = status.toLowerCase();
            let cls = 'badge-unknown';
            if (s === 'available') cls = 'badge-available';
            else if (s === 'occupied') cls = 'badge-occupied';
            else if (s === 'faulty') cls = 'badge-faulty';
            return `<span class="badge ${cls}">${status}</span>`;
        }

        function getTypeIcon(type) {
            if (!type) return '📦';
            const t = type.toLowerCase();
            if (t.includes('laptop')) return '💻';
            if (t.includes('desktop')) return '🖥️';
            if (t.includes('printer')) return '🖨️';
            if (t.includes('monitor')) return '🖥️';
            return '📦';
        }

        async function loadDetail() {
            if (!assetId) {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('errorState').style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`/assets/${assetId}`);
                if (!res.ok) throw new Error('Not found');
                const a = await res.json();

                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('detailGrid').style.display = 'grid';

                // Header
                document.getElementById('headerIcon').textContent = getTypeIcon(a.type);
                document.getElementById('headerTitle').textContent = a.tracking_code || 'Unknown Asset';
                document.getElementById('headerSubtitle').textContent = `${a.brand || ''} ${a.model || ''}`.trim() || '—';
                document.getElementById('headerBadge').innerHTML = statusBadge(a.assignment_status);
                document.title = `${a.tracking_code || 'Asset'} — MF IT Assets`;

                // Device Information
                document.getElementById('deviceFields').innerHTML =
                    fieldRow('Type', a.type) +
                    fieldRow('Owner', a.owner) +
                    fieldRow('Tracking Code', a.tracking_code) +
                    fieldRow('Brand', a.brand) +
                    fieldRow('Model', a.model) +
                    fieldRow('Serial No.', a.serial_no);

                // Specifications
                document.getElementById('specFields').innerHTML =
                    fieldRow('CPU', a.cpu) +
                    fieldRow('RAM', a.ram) +
                    fieldRow('Storage', a.storage);

                // Peripheral Details
                document.getElementById('peripheralFields').innerHTML =
                    fieldRow('Printer Type', a.printer_type) +
                    fieldRow('Printer Color', a.printer_color) +
                    fieldRow('Connectivity', a.connectivity) +
                    fieldRow('Function', a.function) +
                    fieldRow('Monitor Size', a.monitor_size) +
                    fieldRow('Input Type', a.input_type);

                // Financial & Lifecycle
                document.getElementById('financialFields').innerHTML =
                    fieldRow('Price', a.price) +
                    fieldRow('Purchase Date', formatDate(a.purchase_date)) +
                    fieldRow('Estimate Lifespan', a.estimate_lifespan) +
                    fieldRow('Expiry Date', formatDate(a.expiry_date)) +
                    fieldRow('Start Date', formatDate(a.start_date)) +
                    fieldRow('Used (Years)', a.used_years) +
                    fieldRow('End Date', formatDate(a.end_date));

                // Assignment Information
                document.getElementById('assignmentFields').innerHTML =
                    fieldRow('Status', a.assignment_status) +
                    fieldRow("User's Name", a.users_name) +
                    fieldRow('Department', a.department) +
                    fieldRow('Assignment Date', formatDate(a.assignment_date));

            } catch (err) {
                console.error('Error loading detail:', err);
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('errorState').style.display = 'block';
            }
        }

        loadDetail();
    </script>
</body>
</html>
