<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — MF IT Assets</title>
    <meta name="description" content="Login to the MF IT Asset Management System.">
    <link rel="stylesheet" href="/static/styles.css?v=3">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card fade-in">
            <div class="login-header">
                <div class="logo-icon">💻</div>
                <h1>MF IT Assets</h1>
                <p>Sign in to manage your assets</p>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="admin" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="admin123" required>
                </div>
                <div class="login-error" id="loginError" style="display:none">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                    <span id="loginErrorMsg">Invalid credentials</span>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <div class="btn-spinner" style="display:none"></div>
                </button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('loginError');
        const errorMsg = document.getElementById('loginErrorMsg');
        const btn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';
            btn.querySelector('.btn-text').textContent = 'Signing in...';
            btn.disabled = true;

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || 'Login failed');
                }

                // Success — redirect to main page
                window.location.href = '/';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorDiv.style.display = 'flex';
                btn.querySelector('.btn-text').textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
